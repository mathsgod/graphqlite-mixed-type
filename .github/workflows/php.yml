name: PHP Composer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        graphqlite-version: ["8.1.*", "8.2.*", "8.3.*"]

    name: "graphqlite ${{ matrix.graphqlite-version }}"

    steps:
    - uses: actions/checkout@v3

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-graphqlite-${{ matrix.graphqlite-version }}-${{ hashFiles('**/composer.json') }}
        restore-keys: |
          ${{ runner.os }}-php-graphqlite-${{ matrix.graphqlite-version }}-

    - name: Install dependencies
      run: |
        composer require thecodingmachine/graphqlite:${{ matrix.graphqlite-version }} --no-update
        composer update --prefer-dist --no-progress --ignore-platform-req=ext-redis

    - name: Run test suite
      run: vendor/bin/phpunit
